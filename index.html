<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>文件检索</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.18);
    --text-primary: #1a1a18;
    --text-secondary: #5a5a55;
    --text-muted: #9a9a94;
    --accent: #2a6eff;
    --tag-video-bg: #fff0e8; --tag-video-fg: #c45500;
    --tag-pdf-bg: #ffe8e8;   --tag-pdf-fg: #c42020;
    --tag-word-bg: #e8f0ff;  --tag-word-fg: #1a4eb8;
    --tag-excel-bg: #e8f5e8; --tag-excel-fg: #1a7a2a;
    --tag-ppt-bg: #fff4e0;   --tag-ppt-fg: #b86000;
    --tag-archive-bg: #f0eaff; --tag-archive-fg: #6030b0;
    --tag-code-bg: #e4f8f4;  --tag-code-fg: #0a7060;
    --tag-image-bg: #fce8f4; --tag-image-fg: #a01870;
    --tag-other-bg: #efefef; --tag-other-fg: #606060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .topbar-meta { font-size: 12px; color: var(--text-muted); }
  .search-section {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem 1rem;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
    max-width: 640px;
  }
  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(42,110,255,0.1);
  }
  .search-icon { width: 18px; height: 18px; stroke: var(--text-muted); flex-shrink: 0; }
  .search-box input {
    border: none; outline: none;
    background: transparent;
    font-size: 14px;
    color: var(--text-primary);
    flex: 1;
    font-family: inherit;
  }
  .search-box input::placeholder { color: var(--text-muted); }
  .clear-btn {
    cursor: pointer;
    width: 18px; height: 18px;
    stroke: var(--text-muted);
    display: none;
    flex-shrink: 0;
  }
  .clear-btn:hover { stroke: var(--text-primary); }
  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 0.875rem;
    align-items: center;
  }
  .filter-label { font-size: 12px; color: var(--text-muted); margin-right: 2px; }
  .filter-chip {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .main { max-width: 900px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
  .result-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; }
  .file-list { display: flex; flex-direction: column; gap: 4px; }
  .file-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 24px 1fr auto;
    align-items: start;
    gap: 12px;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .file-row:hover { border-color: var(--border-hover); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .file-icon svg { width: 20px; height: 20px; display: block; margin-top: 2px; }
  .file-body { min-width: 0; }
  .file-name {
    font-size: 14px; font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-name mark { background: #fff3a8; color: inherit; border-radius: 2px; padding: 0 1px; }
  .file-sub {
    display: flex; align-items: center; gap: 6px;
    margin-top: 3px; font-size: 12px; color: var(--text-muted); overflow: hidden;
  }
  .file-sub span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-url {
    display: flex; align-items: center; gap: 8px;
    margin-top: 6px;
  }
  .url-text {
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; font-family: monospace;
  }
  .copy-btn {
    font-size: 11px; padding: 2px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer; font-family: inherit;
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .copy-btn.copied { background: #e8f5e8; color: #1a7a2a; border-color: #1a7a2a; }
  .type-tag {
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
    margin-top: 2px;
  }
  .empty { text-align: center; padding: 5rem 0; color: var(--text-muted); }
  .empty svg { width: 40px; height: 40px; stroke: var(--text-muted); margin: 0 auto 12px; display: block; opacity: 0.5; }
  .empty p { font-size: 14px; }
  .loading { text-align: center; padding: 5rem 0; color: var(--text-muted); font-size: 14px; }
  .error-box {
    background: #fff5f5; border: 1px solid #ffc5c5;
    border-radius: 10px; padding: 1.5rem; margin-top: 1rem;
    font-size: 13px; color: #c42020; line-height: 1.7;
  }
  @media (max-width: 600px) {
    .topbar { padding: 0 1rem; }
    .search-section { padding: 1rem 1rem 0.875rem; }
    .main { padding: 1rem 1rem 3rem; }
    .file-row { grid-template-columns: 20px 1fr auto; gap: 8px; padding: 10px 12px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">📁 文件检索</span>
  <span class="topbar-meta" id="topMeta">加载中…</span>
</div>

<div class="search-section">
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="输入文件名关键词…" autocomplete="off" />
    <svg class="clear-btn" id="clearBtn" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </div>
  <div class="filter-row">
    <span class="filter-label">类型：</span>
    <div id="typeFilters"></div>
  </div>
</div>

<div class="main">
  <div class="result-meta" id="resultMeta"></div>
  <div class="file-list" id="fileList"><div class="loading">正在加载文件清单…</div></div>
</div>
